<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging System Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        h1 { text-align: center; margin-bottom: 20px; color: #00d4ff; }
        .config-section {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .config-section label { display: block; margin-bottom: 5px; font-size: 12px; color: #888; }
        .config-section input {
            width: 100%;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #0f0f23;
            color: #fff;
            margin-bottom: 10px;
        }
        .container { display: flex; gap: 20px; height: calc(100vh - 200px); }
        .user-panel {
            flex: 1;
            background: #16213e;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .user-header {
            padding: 15px;
            background: #0f3460;
            border-bottom: 1px solid #333;
        }
        .user-header h2 { font-size: 16px; margin-bottom: 8px; }
        .status { font-size: 12px; color: #888; }
        .status.connected { color: #00ff88; }
        .status.disconnected { color: #ff4444; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }
        .message.sent {
            align-self: flex-end;
            background: #0066ff;
            color: white;
        }
        .message.received {
            align-self: flex-start;
            background: #2d2d44;
            color: #eee;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .typing-indicator {
            font-size: 12px;
            color: #888;
            font-style: italic;
            padding: 5px 15px;
            min-height: 22px;
        }
        .input-area {
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f0f23;
            color: #fff;
            font-size: 14px;
        }
        .input-area input:focus { outline: none; border-color: #0066ff; }
        .input-area button {
            padding: 12px 24px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .input-area button:hover { background: #0052cc; }
        .input-area button:disabled { background: #333; cursor: not-allowed; }
        .connect-btn {
            padding: 8px 16px;
            background: #00aa55;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
        }
        .connect-btn:hover { background: #008844; }
        .connect-btn.disconnect { background: #aa3333; }
        .log-section {
            margin-top: 20px;
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-section h3 { margin-bottom: 10px; font-size: 14px; color: #888; }
        .log { font-family: monospace; font-size: 11px; color: #888; }
        .log .error { color: #ff4444; }
        .log .success { color: #00ff88; }
        .log .info { color: #00d4ff; }
        .system-msg {
            text-align: center;
            font-size: 12px;
            color: #666;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>💬 Messaging System Test</h1>

    <div class="config-section">
        <label>API Base URL</label>
        <input type="text" id="apiUrl" value="http://localhost:8000/api" placeholder="http://localhost:8000/api">
        <label>WebSocket Base URL</label>
        <input type="text" id="wsUrl" value="ws://localhost:8000/api" placeholder="ws://localhost:8000/api">
        <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label>User 1 ID (UUID)</label>
                <input type="text" id="user1Id" placeholder="Enter User 1 UUID">
            </div>
            <div style="flex: 1;">
                <label>User 2 ID (UUID)</label>
                <input type="text" id="user2Id" placeholder="Enter User 2 UUID">
            </div>
        </div>
        <small style="color: #666;">Enter valid user UUIDs from your database, or use the search to find users.</small>
    </div>

    <div class="container">
        <!-- User 1 Panel -->
        <div class="user-panel">
            <div class="user-header">
                <h2>👤 User 1</h2>
                <div class="status disconnected" id="status1">Disconnected</div>
                <button class="connect-btn" id="connectBtn1" onclick="toggleConnection(1)">Connect</button>
            </div>
            <div class="messages" id="messages1"></div>
            <div class="typing-indicator" id="typing1"></div>
            <div class="input-area">
                <input type="text" id="input1" placeholder="Type a message..."
                       onkeyup="handleTyping(1, event)" onkeypress="handleKeyPress(1, event)" disabled>
                <button onclick="sendMessage(1)" id="sendBtn1" disabled>Send</button>
            </div>
        </div>

        <!-- User 2 Panel -->
        <div class="user-panel">
            <div class="user-header">
                <h2>👤 User 2</h2>
                <div class="status disconnected" id="status2">Disconnected</div>
                <button class="connect-btn" id="connectBtn2" onclick="toggleConnection(2)">Connect</button>
            </div>
            <div class="messages" id="messages2"></div>
            <div class="typing-indicator" id="typing2"></div>
            <div class="input-area">
                <input type="text" id="input2" placeholder="Type a message..."
                       onkeyup="handleTyping(2, event)" onkeypress="handleKeyPress(2, event)" disabled>
                <button onclick="sendMessage(2)" id="sendBtn2" disabled>Send</button>
            </div>
        </div>
    </div>

    <div class="log-section">
        <h3>📋 Event Log</h3>
        <div class="log" id="log"></div>
    </div>

    <script>
        let ws1 = null;
        let ws2 = null;
        let conversationId = null;
        let typingTimeout = {};

        function log(message, type = '') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML = `<div class="${type}">[${time}] ${message}</div>` + logDiv.innerHTML;
        }

        function getConfig() {
            return {
                apiUrl: document.getElementById('apiUrl').value,
                wsUrl: document.getElementById('wsUrl').value,
                user1Id: document.getElementById('user1Id').value,
                user2Id: document.getElementById('user2Id').value
            };
        }

        function toggleConnection(userNum) {
            const ws = userNum === 1 ? ws1 : ws2;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            } else {
                connect(userNum);
            }
        }

        async function connect(userNum) {
            const config = getConfig();
            const userId = userNum === 1 ? config.user1Id : config.user2Id;

            if (!userId) {
                log(`User ${userNum}: Please enter a valid UUID`, 'error');
                return;
            }

            // First, create/get conversation between the two users
            if (!conversationId) {
                try {
                    const response = await fetch(
                        `${config.apiUrl}/messaging/conversations?user_id=${config.user1Id}&other_user_id=${config.user2Id}`,
                        { method: 'POST' }
                    );
                    if (response.ok) {
                        const data = await response.json();
                        conversationId = data.id;
                        log(`Conversation created/retrieved: ${conversationId}`, 'success');
                    } else {
                        const error = await response.text();
                        log(`Failed to create conversation: ${error}`, 'error');
                        return;
                    }
                } catch (e) {
                    log(`Error creating conversation: ${e.message}`, 'error');
                    return;
                }
            }

            const wsUrl = `${config.wsUrl}/messaging/ws/${userId}`;
            log(`User ${userNum}: Connecting to ${wsUrl}...`, 'info');

            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                log(`User ${userNum}: Connected!`, 'success');
                document.getElementById(`status${userNum}`).textContent = 'Connected';
                document.getElementById(`status${userNum}`).className = 'status connected';
                document.getElementById(`connectBtn${userNum}`).textContent = 'Disconnect';
                document.getElementById(`connectBtn${userNum}`).className = 'connect-btn disconnect';
                document.getElementById(`input${userNum}`).disabled = false;
                document.getElementById(`sendBtn${userNum}`).disabled = false;

                // Load previous messages
                loadMessages(userNum);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                log(`User ${userNum} received: ${data.type}`, 'info');
                handleMessage(userNum, data);
            };

            ws.onclose = () => {
                log(`User ${userNum}: Disconnected`, 'error');
                document.getElementById(`status${userNum}`).textContent = 'Disconnected';
                document.getElementById(`status${userNum}`).className = 'status disconnected';
                document.getElementById(`connectBtn${userNum}`).textContent = 'Connect';
                document.getElementById(`connectBtn${userNum}`).className = 'connect-btn';
                document.getElementById(`input${userNum}`).disabled = true;
                document.getElementById(`sendBtn${userNum}`).disabled = true;
            };

            ws.onerror = (error) => {
                log(`User ${userNum}: WebSocket error`, 'error');
            };

            if (userNum === 1) ws1 = ws;
            else ws2 = ws;
        }

        function handleMessage(userNum, data) {
            const config = getConfig();
            const myUserId = userNum === 1 ? config.user1Id : config.user2Id;

            switch (data.type) {
                case 'connected':
                    addSystemMessage(userNum, `Connected! Unread: ${data.unread_count}`);
                    break;

                case 'new_message':
                    const msg = data.message;
                    const isSent = msg.sender_id === myUserId;
                    addMessage(userNum, msg.content, isSent, msg.created_at);
                    break;

                case 'typing':
                    if (data.is_typing) {
                        document.getElementById(`typing${userNum}`).textContent = 'Other user is typing...';
                    } else {
                        document.getElementById(`typing${userNum}`).textContent = '';
                    }
                    break;

                case 'read_receipt':
                    addSystemMessage(userNum, 'Messages read ✓✓');
                    break;

                case 'heartbeat':
                    // Silent heartbeat
                    break;

                case 'error':
                    log(`User ${userNum} error: ${data.message}`, 'error');
                    break;
            }
        }

        function addMessage(userNum, content, isSent, timestamp) {
            const messagesDiv = document.getElementById(`messages${userNum}`);
            const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();

            const messageEl = document.createElement('div');
            messageEl.className = `message ${isSent ? 'sent' : 'received'}`;
            messageEl.innerHTML = `
                ${content}
                <div class="time">${time}</div>
            `;
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(userNum, content) {
            const messagesDiv = document.getElementById(`messages${userNum}`);
            const msgEl = document.createElement('div');
            msgEl.className = 'system-msg';
            msgEl.textContent = content;
            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage(userNum) {
            const config = getConfig();
            const ws = userNum === 1 ? ws1 : ws2;
            const input = document.getElementById(`input${userNum}`);
            const content = input.value.trim();
            const recipientId = userNum === 1 ? config.user2Id : config.user1Id;

            if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

            // Send via WebSocket
            ws.send(JSON.stringify({
                type: 'send_message',
                recipient_id: recipientId,
                content: content,
                message_type: 'text'
            }));

            // Add to UI immediately (optimistic update)
            addMessage(userNum, content, true);

            input.value = '';
            log(`User ${userNum} sent: "${content}"`, 'success');

            // Stop typing indicator
            sendTypingIndicator(userNum, false);
        }

        function handleKeyPress(userNum, event) {
            if (event.key === 'Enter') {
                sendMessage(userNum);
            }
        }

        function handleTyping(userNum, event) {
            if (event.key === 'Enter') return;

            const ws = userNum === 1 ? ws1 : ws2;
            if (!ws || ws.readyState !== WebSocket.OPEN || !conversationId) return;

            // Send typing indicator
            sendTypingIndicator(userNum, true);

            // Clear existing timeout
            if (typingTimeout[userNum]) {
                clearTimeout(typingTimeout[userNum]);
            }

            // Stop typing after 2 seconds of no input
            typingTimeout[userNum] = setTimeout(() => {
                sendTypingIndicator(userNum, false);
            }, 2000);
        }

        function sendTypingIndicator(userNum, isTyping) {
            const ws = userNum === 1 ? ws1 : ws2;
            if (!ws || ws.readyState !== WebSocket.OPEN || !conversationId) return;

            ws.send(JSON.stringify({
                type: 'typing',
                conversation_id: conversationId,
                is_typing: isTyping
            }));
        }

        // Load existing messages when conversation is established
        async function loadMessages(userNum) {
            const config = getConfig();
            const userId = userNum === 1 ? config.user1Id : config.user2Id;

            if (!conversationId) return;

            try {
                const response = await fetch(
                    `${config.apiUrl}/messaging/conversations/${conversationId}/messages?user_id=${userId}&limit=50`
                );
                if (response.ok) {
                    const data = await response.json();
                    const messagesDiv = document.getElementById(`messages${userNum}`);
                    messagesDiv.innerHTML = ''; // Clear existing

                    // Messages come newest first, reverse for display
                    data.messages.reverse().forEach(msg => {
                        const isSent = msg.sender_id === userId;
                        addMessage(userNum, msg.content, isSent, msg.created_at);
                    });

                    log(`Loaded ${data.messages.length} messages for User ${userNum}`, 'info');
                }
            } catch (e) {
                log(`Error loading messages: ${e.message}`, 'error');
            }
        }
    </script>
</body>
</html>
