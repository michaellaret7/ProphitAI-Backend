<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watchlist Agent — WebSocket Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; background: #0a0a0f; color: #e0e0e8; min-height: 100vh; padding: 24px; }

    h1 { font-size: 18px; font-weight: 600; color: #a0a0ff; margin-bottom: 20px; letter-spacing: 0.5px; }

    /* ---- Input Area ---- */
    .input-area { display: flex; gap: 10px; margin-bottom: 20px; }
    .input-area input {
      flex: 1; padding: 10px 14px; background: #14141f; border: 1px solid #2a2a3a;
      border-radius: 6px; color: #e0e0e8; font-family: inherit; font-size: 13px; outline: none;
    }
    .input-area input:focus { border-color: #5050aa; }
    .input-area button {
      padding: 10px 22px; background: #3535a0; border: none; border-radius: 6px;
      color: #fff; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .input-area button:hover { background: #4545b5; }
    .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ---- Status Bar ---- */
    .status-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; margin-bottom: 16px; background: #14141f;
      border: 1px solid #2a2a3a; border-radius: 6px; font-size: 12px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.disconnected { background: #555; }
    .status-dot.connected { background: #3ddc84; }
    .status-dot.running { background: #ffb74d; animation: pulse 1s infinite; }
    .status-dot.error { background: #ef5350; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .stats { margin-left: auto; display: flex; gap: 16px; color: #888; font-size: 11px; }
    .stats span { color: #bbb; }

    /* ---- Layout ---- */
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; height: calc(100vh - 180px); }
    .panel {
      background: #14141f; border: 1px solid #2a2a3a; border-radius: 8px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-header {
      padding: 10px 14px; border-bottom: 1px solid #2a2a3a; font-size: 12px;
      font-weight: 600; color: #8888cc; text-transform: uppercase; letter-spacing: 1px;
    }
    .panel-body { flex: 1; overflow-y: auto; padding: 10px; }

    /* ---- Event Items ---- */
    .event {
      padding: 8px 10px; margin-bottom: 6px; border-radius: 4px;
      border-left: 3px solid #333; font-size: 12px; line-height: 1.5;
    }
    .event .ts { color: #555; font-size: 10px; }
    .event .type-tag {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 700; margin-right: 6px; text-transform: uppercase;
    }

    /* Event type colors */
    .event.tool_call_start { border-color: #5c6bc0; background: #1a1a30; }
    .event.tool_call_start .type-tag { background: #3949ab; color: #c5cae9; }

    .event.tool_call_result { border-color: #66bb6a; background: #1a2a1a; }
    .event.tool_call_result .type-tag { background: #2e7d32; color: #c8e6c9; }
    .event.tool_call_result.failed { border-color: #ef5350; background: #2a1a1a; }
    .event.tool_call_result.failed .type-tag { background: #c62828; color: #ffcdd2; }

    .event.iteration_start { border-color: #42a5f5; background: #1a1a2a; }
    .event.iteration_start .type-tag { background: #1565c0; color: #bbdefb; }

    .event.iteration_end { border-color: #78909c; background: #1a1a20; }
    .event.iteration_end .type-tag { background: #37474f; color: #cfd8dc; }

    .event.run_started { border-color: #ab47bc; background: #201a2a; }
    .event.run_started .type-tag { background: #6a1b9a; color: #e1bee7; }

    .event.run_finished { border-color: #ffd54f; background: #2a2a1a; }
    .event.run_finished .type-tag { background: #f9a825; color: #1a1a1a; }

    .event.complete { border-color: #4caf50; background: #1a2a1a; }
    .event.complete .type-tag { background: #2e7d32; color: #c8e6c9; }

    .event.run_error { border-color: #ef5350; background: #2a1a1a; }
    .event.run_error .type-tag { background: #c62828; color: #ffcdd2; }

    .event.heartbeat { border-color: #333; background: #111118; }
    .event.heartbeat .type-tag { background: #333; color: #777; }

    .event .detail { color: #aaa; margin-top: 3px; word-break: break-all; }
    .event .detail code { color: #ce93d8; }
    .event .duration { color: #80cbc4; }

    /* ---- Tool Timeline ---- */
    .tool-card {
      padding: 10px 12px; margin-bottom: 8px; background: #1a1a28;
      border: 1px solid #2a2a3a; border-radius: 6px;
    }
    .tool-card .tool-name { font-weight: 700; color: #7c8dff; font-size: 13px; }
    .tool-card .tool-meta { font-size: 11px; color: #666; margin-top: 2px; }
    .tool-card .tool-args { font-size: 11px; color: #888; margin-top: 6px; white-space: pre-wrap; max-height: 80px; overflow-y: auto; }
    .tool-card .tool-result { font-size: 11px; color: #8bc34a; margin-top: 6px; white-space: pre-wrap; max-height: 120px; overflow-y: auto; }
    .tool-card .tool-result.failed { color: #ef5350; }
    .tool-card.pending { border-color: #5c6bc0; opacity: 0.7; }
    .tool-card.done { border-color: #388e3c; }
    .tool-card.done.failed { border-color: #c62828; }

    /* ---- Final Result ---- */
    #final-result {
      display: none; margin-top: 16px; padding: 16px; background: #14141f;
      border: 1px solid #388e3c; border-radius: 8px;
    }
    #final-result h3 { font-size: 14px; color: #66bb6a; margin-bottom: 10px; }
    #final-result pre { font-size: 12px; color: #ccc; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>

  <h1>// Watchlist Agent — WebSocket Callback Tester</h1>

  <div class="input-area">
    <input id="api-key" type="password" placeholder="X-API-Key" style="max-width:200px;" />
    <input id="preferences" type="text" placeholder="e.g. Build me a watchlist of AI infrastructure stocks..." value="Build me a watchlist of software stocks that you think will rebound from the recent software selloff." />
    <button id="run-btn" onclick="startExecution()">Run Agent</button>
  </div>

  <div class="status-bar">
    <div id="status-dot" class="status-dot disconnected"></div>
    <span id="status-text">Disconnected</span>
    <div class="stats">
      Iteration: <span id="stat-iter">0</span> &nbsp;|&nbsp;
      Tools: <span id="stat-tools">0</span> &nbsp;|&nbsp;
      Tokens: <span id="stat-tokens">0</span>
    </div>
  </div>

  <div class="panels">
    <!-- Left: Raw Event Log -->
    <div class="panel">
      <div class="panel-header">Event Log</div>
      <div class="panel-body" id="event-log"></div>
    </div>

    <!-- Right: Tool Call Timeline -->
    <div class="panel">
      <div class="panel-header">Tool Calls</div>
      <div class="panel-body" id="tool-timeline"></div>
    </div>
  </div>

  <div id="final-result">
    <h3>Final Result</h3>
    <pre id="result-json"></pre>
  </div>

<script>
const API_BASE = 'http://localhost:8000';
const WS_BASE  = 'ws://localhost:8000';

let ws = null;
let executionId = null;
let toolCards = {};  // tool_call_id -> DOM element
let toolCount = 0;
let currentIter = 0;

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

function updateStat(id, value) {
  document.getElementById('stat-' + id).textContent = value;
}

async function startExecution() {
  const prefs = document.getElementById('preferences').value.trim();
  if (!prefs) return;

  // Reset UI
  document.getElementById('event-log').innerHTML = '';
  document.getElementById('tool-timeline').innerHTML = '';
  document.getElementById('final-result').style.display = 'none';
  toolCards = {};
  toolCount = 0;
  currentIter = 0;
  updateStat('iter', '0');
  updateStat('tools', '0');
  updateStat('tokens', '0');

  document.getElementById('run-btn').disabled = true;
  setStatus('running', 'Starting agent...');

  try {
    const apiKey = document.getElementById('api-key').value.trim();

    // 1. Start the agent execution
    const headers = { 'Content-Type': 'application/json' };
    if (apiKey) headers['X-API-Key'] = apiKey;

    const res = await fetch(`${API_BASE}/api/agents/execute`, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        agent_type: 'watchlist',
        parameters: { user_preferences: prefs }
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || res.statusText);
    }

    const data = await res.json();
    executionId = data.execution_id;
    addEvent('info', `Execution started: ${executionId}`, 'run_started');

    // 2. Connect WebSocket
    connectWebSocket(executionId);

  } catch (e) {
    setStatus('error', 'Failed: ' + e.message);
    addEvent('error', e.message, 'run_error');
    document.getElementById('run-btn').disabled = false;
  }
}

function connectWebSocket(execId) {
  ws = new WebSocket(`${WS_BASE}/ws/agent/${execId}`);

  ws.onopen = () => {
    setStatus('connected', 'WebSocket connected — waiting for events...');
    addEvent('info', 'WebSocket connected', 'run_started');
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleEvent(msg);
  };

  ws.onerror = () => {
    setStatus('error', 'WebSocket error');
  };

  ws.onclose = (e) => {
    setStatus('disconnected', `WebSocket closed (${e.code})`);
    document.getElementById('run-btn').disabled = false;
  };
}

function handleEvent(msg) {
  const { type, payload, timestamp } = msg;
  const ts = timestamp ? new Date(timestamp).toLocaleTimeString() : '';

  switch (type) {

    case 'run_started':
      setStatus('running', 'Agent running...');
      addEvent(type, `Session: ${payload.session_id}`, type, ts);
      break;

    case 'iteration_start':
      currentIter = payload.iteration;
      updateStat('iter', currentIter);
      setStatus('running', `Iteration ${currentIter}...`);
      addEvent(type, `Iteration ${payload.iteration} started`, type, ts);
      break;

    case 'iteration_end':
      updateStat('tokens', payload.tokens_used);
      addEvent(type, `Iteration ${payload.iteration} ended — ${payload.tokens_used} tokens`, type, ts);
      break;

    case 'tool_call_start':
      toolCount++;
      updateStat('tools', toolCount);
      setStatus('running', `Calling ${payload.tool_name}...`);
      addEvent(type, `<code>${payload.tool_name}</code> called`, type, ts);
      addToolCard(payload);
      break;

    case 'tool_call_result':
      addEvent(
        type,
        `<code>${payload.tool_name}</code> ${payload.success ? 'succeeded' : 'FAILED'} <span class="duration">(${payload.duration_ms}ms)</span>`,
        payload.success ? type : type + ' failed',
        ts
      );
      updateToolCard(payload);
      break;

    case 'run_finished':
      setStatus('connected', 'Agent finished');
      updateStat('tokens', payload.tokens_used);
      updateStat('iter', payload.iterations);
      addEvent(type, `Finished — ${payload.stop_reason} (${payload.iterations} iters, ${payload.tokens_used} tokens)`, type, ts);
      break;

    case 'complete':
      setStatus('disconnected', 'Execution complete');
      addEvent(type, `Complete — ${payload.iterations} iterations, ${payload.tokens} tokens`, type, ts);
      showFinalResult(payload);
      document.getElementById('run-btn').disabled = false;
      break;

    case 'run_error':
      setStatus('error', 'Error: ' + payload.error);
      addEvent(type, payload.error, type, ts);
      document.getElementById('run-btn').disabled = false;
      break;

    case 'heartbeat':
      // silent — just add a faded event
      addEvent(type, 'heartbeat', type, ts);
      break;

    default:
      addEvent('info', `Unknown event: ${type}`, 'heartbeat', ts);
  }
}

function addEvent(type, html, cssClass, ts) {
  const log = document.getElementById('event-log');
  const el = document.createElement('div');
  el.className = 'event ' + (cssClass || type);
  el.innerHTML = `
    <span class="type-tag">${type.replace(/_/g, ' ')}</span>
    ${html}
    ${ts ? `<span class="ts"> — ${ts}</span>` : ''}
  `;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function addToolCard(payload) {
  const timeline = document.getElementById('tool-timeline');
  const card = document.createElement('div');
  card.className = 'tool-card pending';
  card.id = 'tc-' + payload.tool_call_id;

  let argsStr = '';
  try {
    argsStr = JSON.stringify(payload.arguments, null, 2);
  } catch { argsStr = String(payload.arguments); }

  card.innerHTML = `
    <div class="tool-name">${payload.tool_name}</div>
    <div class="tool-meta">Iteration ${payload.iteration} &bull; Running...</div>
    <div class="tool-args">${argsStr}</div>
    <div class="tool-result" id="tr-${payload.tool_call_id}"></div>
  `;
  timeline.prepend(card);
  toolCards[payload.tool_call_id] = card;
}

function updateToolCard(payload) {
  const card = toolCards[payload.tool_call_id];
  if (!card) return;

  card.className = 'tool-card done' + (payload.success ? '' : ' failed');
  const meta = card.querySelector('.tool-meta');
  meta.textContent = `${payload.success ? 'Succeeded' : 'FAILED'} in ${payload.duration_ms}ms`;

  const resultEl = card.querySelector('.tool-result');
  resultEl.className = 'tool-result' + (payload.success ? '' : ' failed');
  resultEl.textContent = payload.result;
}

function showFinalResult(payload) {
  const container = document.getElementById('final-result');
  const pre = document.getElementById('result-json');
  container.style.display = 'block';

  const display = payload.final_answer || payload.answer || payload;
  try {
    pre.textContent = typeof display === 'string' ? display : JSON.stringify(display, null, 2);
  } catch {
    pre.textContent = String(display);
  }
}
</script>
</body>
</html>
