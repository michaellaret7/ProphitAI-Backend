# Alembic Configuration for ProphitAI Multi-Database Migrations
#
# Usage (run from project root):
#   alembic -c app/db/alembic_migration/alembic.ini -x db=<database_name> <command>
#
# Examples:
#   alembic -c app/db/alembic_migration/alembic.ini -x db=market_data revision --autogenerate -m "add column"
#   alembic -c app/db/alembic_migration/alembic.ini -x db=user_data upgrade head
#   alembic -c app/db/alembic_migration/alembic.ini -x db=prophit_alts downgrade -1
#   alembic -c app/db/alembic_migration/alembic.ini -x db=macro_data current

[alembic]
script_location = %(here)s
prepend_sys_path = %(here)s/../../..

# Migration file naming: YYYY_MM_DD_HHMMSS_message.py
file_template = %%Y_%%m_%%d_%%H%%M%%S_%%(slug)s

# Truncate long migration message slugs at 40 chars
truncate_slug_length = 40

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
