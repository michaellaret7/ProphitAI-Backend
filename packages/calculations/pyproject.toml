[project]
name = "prophitai-calculations"
version = "0.1.0"
description = "Quantitative finance calculations library"
requires-python = ">=3.13"
dependencies = [
    "prophitai-shared",
    "prophitai-data",
    "pandas>=2.0",
    "numpy>=2.0",
    "scipy",
    "pyportfolioopt",
    "cvxpy",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prophitai_calculations"]
