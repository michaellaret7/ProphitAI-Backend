# Alembic Configuration for ProphitAI Multi-Database Migrations
#
# Usage (run from packages/data/):
#   alembic -c migrations/alembic.ini --name <database_name> <command>
#
# Examples:
#   alembic -c migrations/alembic.ini --name market_data revision --autogenerate -m "add column"
#   alembic -c migrations/alembic.ini --name user_data upgrade head
#   alembic -c migrations/alembic.ini --name prophit_alts downgrade -1
#   alembic -c migrations/alembic.ini --name macro_data current

[alembic]
# Base configuration - individual database sections below opus from this
script_location = %(here)s
prepend_sys_path = %(here)s/../src
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s
truncate_slug_length = 40
# Use OS path separator to handle paths with spaces
version_path_separator = os

[market_data]
script_location = %(here)s
version_locations = %(here)s/versions/market_data
version_path_separator = os

[user_data]
script_location = %(here)s
version_locations = %(here)s/versions/user_data
version_path_separator = os

[prophit_alts]
script_location = %(here)s
version_locations = %(here)s/versions/prophit_alts
version_path_separator = os

[macro_data]
script_location = %(here)s
version_locations = %(here)s/versions/macro_data
version_path_separator = os

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
