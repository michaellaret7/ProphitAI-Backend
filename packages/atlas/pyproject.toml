[project]
name = "prophitai-atlas"
version = "0.1.0"
description = "Agentic framework for autonomous portfolio management"
requires-python = ">=3.13"
dependencies = [
    "prophitai-shared",
    "openai>=2.0.0",
    "tiktoken",
    "pydantic>=2.0",
    "pyyaml",
    "langfuse",
    "python-dotenv",
    "opentelemetry-api",
    "perplexityai",
]

[project.optional-dependencies]
claude = ["anthropic>=0.40.0"]
grok = ["xai-sdk"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prophitai_atlas"]
