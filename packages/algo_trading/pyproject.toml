[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prophitai-algo_trading"
version = "0.1.0"
description = "Algorithmic trading library — strategies, engines, execution"
requires-python = ">=3.13"
dependencies = [
    "prophitai-shared",
    "prophitai-data",
    "alpaca>=1.0.0",
    "alpaca-py>=0.43.2",
    "annotated-types>=0.7.0",
    "certifi>=2025.11.12",
    "charset-normalizer>=3.4.4",
    "python-dotenv>=1.2.1",
    "idna>=3.11",
    "matplotlib>=3.10.8",
    "msgpack>=1.1.2",
    "numpy>=2.3.5",
    "pandas>=2.3.3",
    "pydantic>=2.12.4",
    "pydantic_core>=2.41.5",
    "python-dateutil>=2.9.0.post0",
    "pytz>=2025.2",
    "pyzmq",
    "requests>=2.32.5",
    "six>=1.17.0",
    "SQLAlchemy>=2.0.44",
    "sseclient-py>=1.8.0",
    "typing-inspection>=0.4.2",
    "typing_extensions>=4.15.0",
    "tzdata>=2025.2",
    "urllib3>=2.5.0",
    "websockets>=15.0.1",
    "psycopg2-binary>=2.9.11",
]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "off"

[tool.hatch.build.targets.wheel]
packages = ["src/prophitai_algo_trading"]
